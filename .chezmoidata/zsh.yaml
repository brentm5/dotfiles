zsh:
  plugins:
    install_path: '.local/share/zsh/plugins'
    to_install:
      # Defaults are Type: archive, refreshPeriod 168h, stripComponents 1, exact: true
      - name: zsh-syntax-highlighting
        source_file: 'zsh-syntax-highlighting.zsh'
        type: archive
        url: https://github.com/zsh-users/zsh-syntax-highlighting/archive/master.tar.gz
      - name: zsh-autosuggestions
        source_file: 'zsh-autosuggestions.zsh'
        type: archive
        url: https://github.com/zsh-users/zsh-autosuggestions/archive/master.tar.gz
  private:
    - path: '.dotfiles-private'
      repo: 'brentm5/dotfiles-private'